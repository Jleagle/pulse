services:
  pulse:
    image: pulse-tilt
    build:
      context: .
      dockerfile: Dockerfile.tilt
    container_name: pulse-tilt
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - CLIENT_ID=${CLIENT_ID:-your-google-client-id}
      - CLIENT_SECRET=${CLIENT_SECRET:-your-google-client-secret}
      - REDIRECT_URL=http://localhost:8080/oauth/callback
    restart: unless-stopped
